# ── Clever Cloud MySQL ────────────────────────────────────────
# Récupérez ces valeurs depuis :
# clever-cloud.com → Console → votre add-on MySQL → Informations de connexion
DB_HOST = "VOTRE_HOST.mysql.clevercloud.com"
DB_PORT = 3306
DB_USER = "VOTRE_USER_CLEVERCLOUD"
DB_PASS = "VOTRE_PASSWORD_CLEVERCLOUD"
DB_NAME = "VOTRE_DATABASE_CLEVERCLOUD"

